services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seked
      POSTGRES_USER: seked
      POSTGRES_PASSWORD: sekedpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seked -d seked"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://seked:sekedpass@postgres:5432/seked
    ports:
      - "8080:8080"

volumes:
  postgres_data:
